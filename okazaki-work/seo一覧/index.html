<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="robots" content="noindex, nofollow"><title>SEO一覧 | 岡崎作業用</title><style>body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif; background: linear-gradient(180deg, #eef4ff 0%, #f7faff 100%); margin: 0; padding: 56px 24px; color: #14264a; } .container { max-width: 680px; margin: 0 auto; } a.back { display: inline-block; margin-bottom: 24px; color: #2563eb; text-decoration: none; font-size: 14px; font-weight: 600; } a.back:hover { text-decoration: underline; } h1 { margin: 0 0 16px 0; font-size: 26px; color: #1e3a8a; letter-spacing: 0.02em; border-left: 4px solid #2563eb; padding-left: 14px; } ul { list-style: none; padding: 0; margin: 0; } li { background: #ffffff; border: 1px solid #dbe6fb; border-radius: 10px; padding: 16px 20px; margin-bottom: 12px; box-shadow: 0 1px 3px rgba(30, 58, 138, 0.06); } li a { color: #2563eb; text-decoration: none; font-weight: 600; } li a:hover { text-decoration: underline; } footer { margin-top: 40px; font-size: 12px; color: #93a2bf; } .memo-panel { margin-top: 32px; background: #ffffff; border: 1px solid #dbe6fb; border-radius: 10px; padding: 20px 24px; box-shadow: 0 1px 3px rgba(30, 58, 138, 0.06); } .memo-panel h2 { font-size: 18px; margin: 0 0 14px 0; color: #1e3a8a; } .memo-panel label { display: block; font-size: 13px; color: #4a5b7c; margin-bottom: 4px; } .memo-panel input[type="text"], .memo-panel textarea { width: 100%; border: 1px solid #dbe6fb; border-radius: 8px; padding: 8px 10px; font-size: 14px; font-family: inherit; margin-bottom: 12px; box-sizing: border-box; } .memo-panel textarea { min-height: 70px; resize: vertical; } .memo-panel button { background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 9px 18px; font-size: 14px; font-weight: 600; cursor: pointer; } .memo-panel button:hover { background: #1d4ed8; } .memo-status { font-size: 13px; color: #6b7fa3; margin-left: 10px; } .memo-history { margin-top: 20px; border-top: 1px solid #eef2fb; padding-top: 16px; } .memo-item { padding: 10px 0; border-bottom: 1px solid #f0f4fc; } .memo-item:last-child { border-bottom: none; } .memo-meta { display: flex; justify-content: space-between; font-size: 12px; color: #6b7fa3; margin-bottom: 4px; } .memo-name { font-weight: 600; color: #1e3a8a; } .memo-text { font-size: 14px; color: #14264a; white-space: pre-wrap; } .memo-empty { font-size: 13px; color: #93a2bf; }</style></head><body><div class="container"><a class="back" href="../">← 岡崎作業用に戻る</a><h1>SEO一覧</h1><ul><li><a href="../seo:yobishiken-2026.html">予備試験とは？令和8年（2026年）の日程・科目・合格率まとめ</a></li></ul><div class="memo-panel"><h2>メモ・コメント</h2><form id="memo-form"><label for="memo-name">名前</label><input type="text" id="memo-name" maxlength="49" required><label for="memo-text">メモ</label><textarea id="memo-text" maxlength="999" required></textarea><button type="submit">追加する</button><span class="memo-status" id="memo-status"></span></form><div class="memo-history" id="memo-history"><p class="memo-empty">読み込み中...</p></div></div><footer>© kato-seminar-review</footer></div><script type="module">import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js"; import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js"; const firebaseConfig = { apiKey: "AIzaSyClRvwl06F8sPrw6kUwZ1SlWy0M3FzBO7c", authDomain: "okazaki-kato-seminar00.firebaseapp.com", projectId: "okazaki-kato-seminar00", storageBucket: "okazaki-kato-seminar00.firebasestorage.app", messagingSenderId: "264771224160", appId: "1:264771224160:web:f89b3a4004330ea7fef905" }; const app = initializeApp(firebaseConfig); const db = getFirestore(app); const form = document.getElementById('memo-form'); const nameInput = document.getElementById('memo-name'); const memoInput = document.getElementById('memo-text'); const historyEl = document.getElementById('memo-history'); const statusEl = document.getElementById('memo-status'); form.addEventListener('submit', async function(e) { e.preventDefault(); const name = nameInput.value.trim(); const memo = memoInput.value.trim(); if (!name || !memo) { return; } statusEl.textContent = '送信中...'; try { await addDoc(collection(db, 'seo_memos'), { name: name, memo: memo, createdAt: serverTimestamp() }); memoInput.value = ''; statusEl.textContent = ''; } catch (err) { statusEl.textContent = '送信に失敗しました。'; console.error(err); } }); const q = query(collection(db, 'seo_memos'), orderBy('createdAt', 'desc')); onSnapshot(q, function(snapshot) { historyEl.innerHTML = ''; if (snapshot.empty) { historyEl.innerHTML = '<p class="memo-empty">まだメモはありません。</p>'; return; } snapshot.forEach(function(docSnap) { const data = docSnap.data(); const item = document.createElement('div'); item.className = 'memo-item'; const meta = document.createElement('div'); meta.className = 'memo-meta'; const nameSpan = document.createElement('span'); nameSpan.className = 'memo-name'; nameSpan.textContent = data.name || ''; const dateSpan = document.createElement('span'); dateSpan.className = 'memo-date'; dateSpan.textContent = (data.createdAt && data.createdAt.toDate) ? data.createdAt.toDate().toLocaleString('ja-JP') : '送信中...'; meta.appendChild(nameSpan); meta.appendChild(dateSpan); const textDiv = document.createElement('div'); textDiv.className = 'memo-text'; textDiv.textContent = data.memo || ''; item.appendChild(meta); item.appendChild(textDiv); historyEl.appendChild(item); }); });</script></body></html>
